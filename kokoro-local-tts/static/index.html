<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kokoro Local TTS — who-is-human voice spike</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Kokoro Local TTS</h1>
        <p class="subtitle">
          Local text-to-speech spike for <strong>who-is-human</strong> · runs
          fully offline on CPU
        </p>
        <div id="health" class="health" aria-live="polite">checking server…</div>
      </header>

      <section class="panel">
        <h2>Character presets</h2>
        <p class="hint">
          One click loads a character's voice, speed, and a sample line of
          dialogue. Then press <em>Generate</em>.
        </p>
        <div id="presets" class="presets"></div>
      </section>

      <section class="panel">
        <div class="controls">
          <div class="field">
            <label for="language">Language</label>
            <select id="language"></select>
          </div>
          <div class="field">
            <label for="voice">Voice</label>
            <select id="voice"></select>
          </div>
          <div class="field field--speed">
            <label for="speed">Speed <span id="speedValue">1.00</span>×</label>
            <input
              id="speed"
              type="range"
              min="0.7"
              max="1.3"
              step="0.05"
              value="1.0"
            />
          </div>
        </div>

        <div class="field">
          <label for="text">Text <span id="charCount" class="muted">0 / 500</span></label>
          <textarea
            id="text"
            rows="4"
            maxlength="500"
            placeholder="Type what the character should say…"
          ></textarea>
        </div>

        <div class="actions">
          <button id="generate" class="btn btn--primary" type="button">
            Generate
          </button>
          <span id="status" class="status" aria-live="polite"></span>
        </div>

        <div id="error" class="error" role="alert" hidden></div>
      </section>

      <section id="result" class="panel result" hidden>
        <h2>Result</h2>
        <div class="result-meta">
          <span id="metaDuration" class="chip"></span>
          <span id="metaCache" class="chip"></span>
          <span id="metaVoice" class="chip"></span>
        </div>
        <audio id="player" controls preload="auto"></audio>
        <div class="actions">
          <button id="play" class="btn" type="button">▶ Play</button>
          <a id="download" class="btn btn--link" download>⬇ Download WAV</a>
        </div>
      </section>

      <footer class="footer">
        <span>Kokoro-82M · 24 kHz WAV · <code>POST /api/tts</code></span>
      </footer>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
